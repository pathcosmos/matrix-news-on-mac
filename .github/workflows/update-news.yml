name: Update News Data

on:
  workflow_dispatch:
  schedule:
    - cron: "*/10 * * * *"

permissions:
  contents: write

jobs:
  update-news:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch RSS feeds
        run: swift run matrix-news-fetcher --sources Config/news-sources.json --output Data --license-scope test-only --limit 50 --minimum-items 50

      - name: Commit updated data
        run: |
          if git diff --quiet -- Data; then
            echo "No news data changes"
            exit 0
          fi
          git config user.name "matrix-news-bot"
          git config user.email "matrix-news-bot@users.noreply.github.com"
          git add Data/manifest.json Data/latest.json Data/sources.json
          git commit -m "data: update news feed"
          git push
